name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Validate datasets and artifacts
        run: python scripts/validate_data.py

      - name: Run pytest
        run: python -m pytest

      - name: Run Bandit security scan
        run: python -m bandit -r scripts

      - name: Compile Python scripts
        run: python -m py_compile scripts/*.py

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Audit development dependencies
        run: pip-audit -r requirements-dev.txt

      - name: Audit cleaning dependencies
        run: pip-audit -r requirements-cleaning.txt

      - name: Audit notebook dependencies
        run: pip-audit -r requirements-notebooks.txt
